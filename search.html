                                    <script>
                                        // 1. Just list the file names.
                                        const pagesToSearch = [
                                            { url: "index.html", title: "Home" },
                                            { url: "about-us.html", title: "About Us" },
                                            { url: "locations.html", title: "Locations" },
                                            { url: "price-list.html", title: "Price List" },

                                            { url: "customersgallery.html", title: "Gallery" }
                                        ];

                                        let sitePagesData = [];
                                        let idx;
                                        let loadedCount = 0;

                                        function startAutoIndexing() {
                                            const sandbox = document.getElementById('iframe-sandbox');

                                            pagesToSearch.forEach(page => {
                                                const iframe = document.createElement('iframe');
                                                iframe.src = page.url;

                                                iframe.onload = function () {
                                                    try {
                                                        const doc = iframe.contentDocument || iframe.contentWindow.document;

                                                        // Strip out scripts, styles, common header/footer classes, navigation, and menu bars
                                                        // Note: Added common Weebly menu classes like .wsite-menu, #nav, #navigation, .nav-wrap
                                                        const elementsToRemove = doc.querySelectorAll(
                                                            'script, style, header, footer, nav, #nav, #navigation, .nav-wrap, .wsite-menu-default, .wsite-navigation, .wsite-menu, #header'
                                                        );
                                                        elementsToRemove.forEach(el => el.remove());

                                                        // Extract the clean visible text
                                                        const pageText = (doc.body.textContent || doc.body.innerText)
                                                            .replace(/\s+/g, ' ')
                                                            .trim();

                                                        sitePagesData.push({
                                                            title: page.title,
                                                            url: page.url,
                                                            content: pageText
                                                        });
                                                    } catch (e) {
                                                        console.warn(`Could not read content from ${page.url} directly. Fallback active.`);
                                                    }

                                                    loadedCount++;
                                                    if (loadedCount === pagesToSearch.length) {
                                                        buildIndexAndSearch();
                                                    }
                                                };

                                                iframe.onerror = function () {
                                                    loadedCount++;
                                                    if (loadedCount === pagesToSearch.length) {
                                                        buildIndexAndSearch();
                                                    }
                                                };

                                                sandbox.appendChild(iframe);
                                            });
                                        }

                                        function buildIndexAndSearch() {
                                            idx = lunr(function () {
                                                this.ref('url');
                                                this.field('title', { boost: 10 });
                                                this.field('content');

                                                sitePagesData.forEach(doc => this.add(doc));
                                            });

                                            executeSearch();

                                        // Helper to find the searched word and return a clean snippet around it
                                        function getContextSnippet(text, query, snippetLength = 160) {
                                            const cleanText = text.replace(/\s+/g, ' ');
                                            const lowerText = cleanText.toLowerCase();
                                            const lowerQuery = query.toLowerCase().trim();

                                            const index = lowerText.indexOf(lowerQuery);

                                            // If the word isn't found or query is empty, just return the start of the page
                                            if (index === -1 || !lowerQuery) {
                                                return cleanText.substring(0, snippetLength) + '...';
                                            }

                                            // Calculate window start and end to keep the searched term centered
                                            let start = Math.max(0, index - Math.floor(snippetLength / 2));
                                            let end = Math.min(cleanText.length, start + snippetLength);

                                            // Adjust start window if we hit the end boundary early
                                            if (end - start < snippetLength) {
                                                start = Math.max(0, end - snippetLength);
                                            }

                                            let snippet = cleanText.substring(start, end);

                                            // Add ellipsis to show it's cropped
                                            if (start > 0) snippet = '...' + snippet;
                                            if (end < cleanText.length) snippet = snippet + '...';

                                            return snippet;
                                        }

                                        function executeSearch() {
                                            const urlParams = new URLSearchParams(window.location.search);
                                            const query = urlParams.get('q');

                                            const statusDiv = document.getElementById('search-status');
                                            const resultsList = document.getElementById('search-results');

                                            if (!query) {
                                                statusDiv.textContent = "Please enter a search term.";
                                                return;
                                            }

                                            statusDiv.innerHTML = 'Showing results for: <strong>' + escapeHtml(query) + '</strong>';

                                            const results = idx.search(query.toLowerCase().trim() + "*");
                                            resultsList.innerHTML = '';

                                            if (results.length === 0) {
                                                resultsList.innerHTML = '<li>No results found for your search.</li>';
                                                return;
                                            }

                                            results.forEach(result => {
                                                const page = sitePagesData.find(p => p.url === result.ref);
                                                if (page) {
                                                    // Find the context snippet surrounding the searched keyword
                                                    const snippet = getContextSnippet(page.content, query);

                                                    const li = document.createElement('li');
                                                    li.style.marginBottom = '20px';
                                                    li.innerHTML = `
        <h3 style="margin-bottom: 5px;">
          <a href="${page.url}" style="color: #0076df; text-decoration: none; font-size: 1.2rem; font-weight: bold;">
            ${page.title}
          </a>
        </h3>
        <p style="color: #666; font-size: 0.95rem; margin: 0;">${snippet}</p>
      `;
                                                    resultsList.appendChild(li);
                                                }
                                            });
                                        }

                                        function escapeHtml(str) {
                                            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
                                        }

                                        window.onload = startAutoIndexing;
                                    </script>
                                    <div class="wsite-spacer" style="height:50px;"></div>
                                </div>
                            </div>
                        </div>

                    </div>
